<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="icon" href="icons/airbnb.png">
  <link rel="stylesheet" href="styles/general.css">
  <link rel="stylesheet" href="styles/header.css">
  <link rel="stylesheet" href="styles/options.css">
  <title>Airbnb Clone</title>
</head>
<body>

  <!-- Header Section -->
  <header class="header">
    <div class="left-section">
      <img class="airbnb-logo" src="images/Airbnb_Logo_Bélo.svg.png" alt="airbnb-logo">
    </div>
    <div class="middle-section">
      <input class="location-box" type="text" placeholder="Location">
      <button class="search-button">
        <img class="search-icon" src="icons/search-icon.png" alt="search-icon">
        <div class="tooltip">Search</div>
      </button>
    </div>
    <div class="right-section">
      <p class="airbnb-text">Become a host</p>
      <div class="globe-container">
        <img class="globe-icon" src="icons/globe.png" alt="globe-icon">
        <div class="tooltip">Region</div>
      </div>
      <img class="hamburger-icon" src="icons/hamburger.png" alt="hamburger-icon">
    </div>
  </header>

  <!-- Options Container -->
   <main>
     <section id="options">
      <div class="options-container">
        <div class="options-content">
          <img class="options-icon" src="icons/swimming-pool.jpeg" alt="amazing-pool-icon">
          <p class="options-text">Amazing Pools</p>
        </div>
        <div class="options-content">
          <img class="options-icon" src="icons/play.jpeg" alt="play-icon">
          <p class="options-text">Play</p>
        </div>
        <div class="options-content">
          <img class="options-icon" src="icons/historical-homes.jpeg" alt="historical-homes-icon">
          <p class="options-text">Historical Homes</p>
        </div>
        <div class="options-content">
          <img class="options-icon" src="icons/country-side.jpeg" alt="country-side-icon">
          <p class="options-text">Country Side</p>
        </div>
        <div class="options-content">
          <img class="options-icon" src="icons/surfing.jpeg" alt="surfing-icon">
          <p class="options-text">Surfing</p>
        </div>
        <div class="options-content">
          <img class="options-icon" src="icons/farms.jpeg" alt="farms-icon">
          <p class="options-text">Farms</p>
        </div>
        <div class="options-content">
          <img class="options-icon" src="icons/amazing-views.jpeg" alt="amazing-views-icon">
          <p class="options-text">Amazing Views</p>
        </div>
        <div class="options-content">
          <img class="options-icon" src="icons/rooms.jpeg" alt="rooms-icon">
          <p class="options-text">Rooms</p>
        </div>
        <div class="options-content">
          <img class="options-icon" src="icons/lakefront.jpeg" alt="lakefront-icon">
          <p class="options-text">Lake Front</p>
        </div>
        <div class="options-content">
          <img class="options-icon" src="icons/beachfront.jpeg" alt="beachfront-icon">
          <p class="options-text">Beach Front</p>
        </div>
        <div class="options-content">
          <img class="options-icon" src="icons/omg.jpeg" alt="camping-icon">
          <p class="options-text">Camping</p>
        </div>
        <div class="options-content">
          <img class="options-icon" src="icons/golfing.jpeg" alt="golfing-icon">
          <p class="options-text">Golfing</p>
        </div>
      </div>
     </section>
   </main>
</body>
</html>
